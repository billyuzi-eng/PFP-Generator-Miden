<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miden PFP Generator</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;600;700&display=swap');

* { box-sizing: border-box; }

body { background:#0d0d0d; margin:0; }

.w { background: #0d0d0d; border-radius: 16px; padding: 28px; font-family: 'Share Tech Mono', monospace; color: #f0ece4; }

.layout { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
@media(max-width:560px){ .layout { grid-template-columns:1fr; } }

.section-label { font-size: 10px; letter-spacing: 2px; color: #5a5040; margin-bottom: 10px; text-transform: uppercase; }

.upload-zone { border: 1px dashed #2a2520; border-radius: 8px; background: #111; padding: 24px; text-align: center; cursor: pointer; position: relative; }
#file-in { position:absolute; inset:0; opacity:0; cursor:pointer; }

.opts { display:flex; gap:6px; flex-wrap:wrap; }
.opt { padding:5px 10px; background:#111; border:1px solid #2a2520; color:#5a5040; cursor:pointer; }
.opt.on { background:#e8540a; color:#000; border-color:#e8540a; }

.gen-btn, .dl-btn { margin-top:10px; padding:10px; width:100%; cursor:pointer; }

.cv-wrap { position:relative; border:1px solid #2a2520; aspect-ratio:1; display:flex; align-items:center; justify-content:center; }
#pfp-cv { width:100%; height:100%; display:none; }
</style>
</head>

<body>

<div class="w">
  <div class="layout">

    <div>
      <p class="section-label">Upload</p>
      <div class="upload-zone">
        <input type="file" id="file-in" accept="image/*">
        Upload Image
      </div>

      <p class="section-label">Badge</p>
      <div class="opts" id="bd-opts">
        <button class="opt on" data-v="miden">MIDEN</button>
        <button class="opt" data-v="builder">Builder</button>
        <button class="opt" data-v="creator">Creator</button>
        <button class="opt" data-v="dev">Developer</button>
        <button class="opt" data-v="none">None</button>
      </div>

      <button class="gen-btn" id="gen-btn" disabled>Generate</button>
    </div>

    <div>
      <p class="section-label">Preview</p>
      <div class="cv-wrap">
        <canvas id="pfp-cv"></canvas>
      </div>
      <button class="dl-btn" id="dl-btn" disabled>Download</button>
    </div>

  </div>
</div>

<script>
const S = 800;
const fileIn = document.getElementById('file-in');
const genBtn = document.getElementById('gen-btn');
const dlBtn = document.getElementById('dl-btn');
const cv = document.getElementById('pfp-cv');
const ctx = cv.getContext('2d');

let img = null;
let selBd = 'miden';

document.querySelectorAll('#bd-opts .opt').forEach(b => {
  b.onclick = () => {
    document.querySelectorAll('#bd-opts .opt').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    selBd = b.dataset.v;
    if(img) render();
  }
});

fileIn.onchange = e => {
  const r = new FileReader();
  r.onload = ev => {
    const i = new Image();
    i.onload = () => { img=i; genBtn.disabled=false; render(); };
    i.src = ev.target.result;
  };
  r.readAsDataURL(e.target.files[0]);
};

genBtn.onclick = render;

dlBtn.onclick = () => {
  const a=document.createElement('a');
  a.href=cv.toDataURL();
  a.download='pfp.png';
  a.click();
};

function render(){
  cv.width=S; cv.height=S;
  ctx.fillStyle='#111'; ctx.fillRect(0,0,S,S);

  const r=S*0.35;
  ctx.save();
  ctx.beginPath(); ctx.arc(S/2,S/2,r,0,Math.PI*2); ctx.clip();
  ctx.drawImage(img, S/2-r, S/2-r, r*2, r*2);
  ctx.restore();

  drawBadge();

  cv.style.display='block';
  dlBtn.disabled=false;
}

function drawBadge(){
  if(selBd==='none') return;

  let label='';
  if(selBd==='miden') label='MIDEN';
  else if(selBd==='builder') label='BUILDER';
  else if(selBd==='creator') label='CONTENT CREATOR';
  else if(selBd==='dev') label='DEVELOPER';

  ctx.fillStyle='#e8540a';
  ctx.fillRect(200,650,400,60);

  ctx.fillStyle='#000';
  ctx.font='20px Arial';
  ctx.textAlign='center';
  ctx.fillText(label,400,690);
}
</script>

</body>
</html>

</body>
</html>
